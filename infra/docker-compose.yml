version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amkyaw-vpn-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amkyaw-vpn-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
